會的思想有一點最特別最含有革命性那就是他很明白清楚的反對坐禪反對向來佛教徒最重視的禪定工夫他特別反對當時禪學大師神秀門下提倡的十六字禪法凝心入定住心看淨起心外照攝心內證神會在壇語裏說即如凝心入定墮無記空出定以後起心分別一切世間有為喚此為慧經中名為妄心此則慧時則無定定時則無慧如是解者皆不離煩惱凝心入定住心看淨起心外照攝心內證非解脫心亦是法縛心不中用涅槃經云佛告琉璃光菩薩善男子汝莫入甚深空定何以故今大衆鈍故若入定一切諸波羅蜜不知故神會反對禪定因為那樣凝心入定豈不是定時則無慧了嗎他引涅槃經裏佛告琉璃光菩薩的一句很驚人的話善男子汝莫入甚深空定何以故令大衆鈍故今南北本涅槃經都沒有令字他自己下解釋說若入定一切諸波羅蜜不知故這就是定時則無慧的說法了壇語裏又批評二乘人即聲聞與緣覺執定的可笑如須陀洹在定八萬劫斯陀含在定六萬劫阿那含在定四萬劫阿羅漢在定二萬劫辟支佛在定十千劫當二乘在定時縱為說無上菩提法終不肯領受這也是說定時則無慧總而言之神會的壇語的主旨只是立無念為宗無念只是不作意只是不作意取菩提不作意取涅槃不作意取空不作意取定他于六波羅蜜之中只取般若波羅蜜那就是要把禪波羅蜜包括在般若波羅蜜之中那就是要把定包括在慧之中在破壞的方面他拋棄了向來重視的坐禪的定壇語說知識一切善惡總莫思量不得凝心住心亦不得將心直視心不得作意攝心亦不得遠看近看經云不觀是菩提無憶念故即是自性空寂心又說夫求解脫者離身意識五法三自性八識二無我離內外見亦不於三界現身意是為宴坐如此坐者佛即印可六代祖師以心傳心離文字故從上相承亦復如是他在別處說的更明白不在坐裏若以坐為是舍利弗宴坐林間不應被維摩詰訶訶云不於三界現身意是為宴坐但一切時中見無念者不見身相名為正定不見心相名為正慧神會和尚遺集卷一頁一三四他在南宗定是非論裏也說的更明白遠法師問嵩嶽普寂禪師東嶽降魔藏禪師此二大德皆教人坐禪凝心入定住心看淨起心外照攝心內證指此以為教門禪師今日何故說禪不教人坐不教人凝心入定住心看淨起心外照攝心內證何名坐禪和上答若教人坐教人凝心入定住心看淨起心外照攝心內證此是障菩提今言坐者念不起為坐今言禪者見本性為禪所以不教人坐身住心入定若指彼教門為是者維摩詰不應訶舍利弗宴坐神會和尚遺集卷三頁一七五一七六即新寫定本菩提達摩南宗定是非論下卷我在三十年前曾指出後世所奉為禪宗唯一經典的六祖壇經便是神會的傑作我說我信壇經的主要部分是神會所作因為壇經中有許多部分和新發見的神會語録完全相同我當時曾列舉五組例子表示壇經的思想和文字都和神會語録很相同這五組是第一組定慧等第二組坐禪第三組闢當時的禪學第四組論金剛經第五組無念胡適荷澤大師神會傳原載神會和尚遺集卷首頁七三九後來收在胡適論學近著第一集裏又在臺北版胡適文存第四集裏現在神會的壇語出現了我們可以看出壇語的思想和文字也往往很接近六祖壇經的敦煌寫本我在上引的壇語裏論無念論定慧等論當時的禪學論坐禪的一些文句都可以在六祖壇經裏尋得很相同的文句可以供我們的比勘最可注意的是南陽和上頓教解脫禪門直了性壇語的標題敦煌寫本的六祖壇經的原題是南宗頓教最上大乘摩訶般若波羅蜜經六祖惠能大師於韶州大梵寺施法壇經一卷兼受無相戒敦煌本的卷尾又有簡題一行南宗頓教最上大乘壇經法一卷壇語的壇字和壇經的壇字原文可能都是檀波羅密的檀字即是檀那即是檀施的意思敦煌本壇經裏面還有幾處寫作從木的檀字我現在不想重新討論這個壇經作者是不是神會的問題我只想指出這篇壇語的出現應該可以引起我們研究這個問題的一點新興趣二校寫菩提達摩南宗定是非論後記在三十多年前我校寫了巴黎國家圖書館藏的號敦煌卷子裏的菩提達摩南宗定是非論開篇的四十九行殘卷作為神會和尚遺集卷二我又校寫了號殘卷作為神會和尚遺集卷三但我當時就說此卷也許即是南宗定是非論的一部分這兩卷共有五千多字現在我把前一卷重新校寫了題作菩提達摩南宗定是非論的上卷我把巴黎近年尋出的號殘卷裏的菩提達摩南宗定是非論也校寫出來題作此論的下卷我從前校寫的遺集卷三果然是此論的一部分即在此下卷之中故此一部分有兩個敦煌寫本可以互相校勘但下卷的其他部分及上卷全部都沒有他本可供校勘宗密的圓覺經大疏抄的神會略傳裏曾提及南宗定是非論因洛陽詰北宗傳衣之由及滑臺演兩宗真僞與崇遠等持論一會具在南宗定是非論中也便有難起開法不得這裏具在南宗定是非論中也十個字是夾注在三十二年前所有禪宗史料之中只有這一條小注提到南宗定是非論直到我的神會和尚遺集的二三兩卷印出來世人才知道南宗定是非論是什麼樣子的作戰文字現在我們湊合三個敦煌殘卷共有一萬三四千字其中雖有小殘缺大概菩提達摩南宗定是非論全部都在這裏了我們看這一萬三四千字的全文大致可以分作這幾個部分甲獨孤沛的序說修論的因緣乙菩提達摩南宗定是非論的本文一介紹崇遠法師二為天下學道者定宗旨為天下學道者辨是非南宗定是非論的主文三金剛般若波羅蜜最尊最勝最第一自禪師修何法行何行以下凡四千字占全論近三分之一全是宣傳金剛般若波羅蜜經的爛調說誦持此經流通此經為人演說此經有無量功德丙菩提達摩南宗定是非論的後序及讚文前面的序後面的後序及讚大概都是獨孤沛作的前序說所以修論後序也說所以修論聊欲指南使大道洽於蒼生正法流於天下又說所是對問宏詞因即編之為論這都是一個人的口氣故知前序與後序及讚都是那位獨孤沛的手筆這位修論的人的文理很不清楚見解也很不高明故此論的文字遠不如神會語録的明白可讀也不能比南陽和上壇語的親切流利宋僧傳說神會年方幼學厥性惇明從師傳授五經克通幽賾次尋莊老靈府廓然我們看他的語録和壇語也可以看出他似是一位讀書能文的和尚為什麼這篇重要的作戰文字必須請這位獨孤沛修論呢我想這大概是因為神會有些話自己不便說所以有倩別人代說的需要例如此論本文說遠法師問能禪師已後有傳授人不答有又問傳授者是誰和上答已後應自知本文又說能禪師是的的相傳付囑人已下門徒道俗近有數餘人無有一人敢濫開禪門縱有一人得付囑者至今未說這兩段裏都沒有明說神會是韶州慧能禪師的相傳付囑人但獨孤沛的後序裏就不妨明說我和上承六代之後付囑分明這就是倩別人說話的方便之處了南宗定是非論的本文三大段之中只有那定宗旨辨是非的一大段是真正主文前面介紹那位兩京名播海外知聞的崇遠法師一段實在很不高明後面近四千字的宣傳金剛經的一大段也很不高明這四千字的宣傳文字只有一點歷史意義就是說菩提達摩一派的禪學本來常奉四卷楞伽以為法要故此派自稱楞伽宗直到神會同時的普寂和尚的碑傳裏還說神秀教普寂令看思益思益梵天所問經次楞伽因而告曰此兩部經禪學所宗要者李雍大照禪師塔銘全唐文二六二如今神會自稱菩提達摩南宗然而他的遺著裏沒有一個字提及四卷楞伽經倒有四千字宣傳那簡短的一卷金剛般若波羅蜜經這就是神會很大膽的把金剛經來替代楞伽經了看胡適楞伽宗考原載史語所集刊第五本第三分收在胡適論學近著第一集又收在臺北版胡適文存第四集南宗定是非論本文的主文開始就說神會今設無遮大會兼莊嚴道場不為功德為天下學道者定宗旨為天下學道者辨是非所謂定宗旨辨是非全文有四千多字只是神會和尚要為他的老師韶州慧能和尚爭取菩提達摩傳下來的一派禪學的的的相傳付囑人的正統地位其實只是神會為他自己所謂菩提達摩南宗爭取禪門正統的地位所謂南宗定是非只是為這個南宗爭法統這個故事說來很長看胡適的楞伽宗考簡單說來大致如下中國佛教到了隋唐之際已到了印度的禪法開始簡單化將要過渡到更簡單化的中國禪宗的時代了隋唐之際的禪法有兩大派一派是南嶽慧思五一四五七七到天台智顗五三一五九七的止觀禪法一派是菩提達摩依我的考定他來中國在劉宋晚年在中國約五十年約當四七五五三傳下來的楞伽宗天台宗注重止定和觀慧已是簡易化了的禪法楞伽宗在實行的方面注重奉頭陀行教人苦樂隨緣在衣食住各方面都極力刻苦自己在教義方面只奉四卷楞伽經以為心要這也是簡易化了的禪法在七世紀的中期楞伽宗出了幾個有大名的禪師特別是蘄州黃梅雙峰山的道信死在六五一和弘忍死在六七四當時人稱為東山法門弘忍門下弟子散布各地有嵩山的法如有泰山的降魔藏有劍南資州的智詵有嶺南韶州的慧能其中一個最有名的是荊州玉泉寺的神秀傳東山妙法開室巖居年過九十形彩日茂兩京學徒群方信士雲集霧委虛往實歸宋之問為洛下諸僧請法事迎秀禪師表則天皇帝武后在久視元年七下詔請神秀到東京張說在他的大通禪師碑銘裏記此事久視年中禪師春秋高矣詔請而來趺坐覲君肩輿上殿屈萬乘而稽首灑九重而宴居傳聖道者不北面有盛德者無臣禮遂推為兩京法主三帝國師三帝是則天帝中宗睿宗神秀在東京六年死在神龍二年七六神秀死後他的大弟子普寂義福敬賢惠福等都有大名這是楞伽宗最有勢力的時期神秀死後張說在碑文裏敘述他的傳授世系如下菩提達摩慧可僧璨道信弘忍神秀這個世系後來竟成了後來爭法統的起點宋僧傳的義福傳說神秀禪門之傑雖有禪行得帝王重之無以加者而未嘗聚徒開法也洎乎普寂始於都城傳教二十餘載人皆仰之義福死在開元二十四年七三六普寂死在開元二十七年七三九就在開元二十年七三二當義福普寂都最受朝野尊崇的時候滑臺大雲寺有一個和尚開了一個無遮大會在大會場上大聲指斥神秀普寂一派傳出來的傳法世系是不可信的是僞造的指斥神秀一門師承是傍法門是漸指出弘忍的傳法付囑人不是神秀而是韶州的慧能指出北方的漸門是旁支而南方的頓教是真傳正統這個和尚就是神會神會爭法統的戰鬪文字就是現在我們校寫出來的菩提達摩南宗定是非論他作戰的法寶就是他自己造出來的傳衣說他說菩提達摩開佛知見以為密契便傳一領袈裟以為法信授與慧可慧可傳僧璨璨傳道信道信傳弘忍弘忍傳慧能六代相承內傳法契以印證心外傳袈裟以定宗旨他大膽的喊著從上相傳一一皆與達摩袈裟為信其袈裟今見在韶州更不與人餘物相傳者即是謬言韶州遠在東南五千里之外當日聽神會說這話的人誰能親到韶州去查勘那件傳法袈裟的有無呢神秀普寂門下的和尚誰能提出證據指斥那傳袈裟的話是謬言呢神會的戰略是先下手取攻勢這種攻勢是很難應付的試看此論中最感動人的一段遠法師問曰普寂禪師名字蓋國天下