忍的弟子並且是他的十個可以傳道的弟子之一但神會要世人相信的慧能是五祖弘忍在東山將袈裟付與的承後人是得傳授付囑人是一代只許一人承後的第六代這是神會的南宗定是非論要建立的法統楞伽宗向來用劉宋時代譯的四卷楞伽經為法要楞伽即是錫蘭島故法沖傳裏此宗又稱南天竺一乘宗道宣續僧傳稱菩提達摩為南天竺婆羅門種神會此論則稱達摩是南天竺國國王第三子故楞伽宗的和尚自稱南宗大概就等於法沖所謂南天竺一乘宗神會此論中屢次說普寂禪師口稱南宗都可以作如此解說但神會所謂菩提達摩南宗是指菩提達摩派下的另一個南宗是專指嶺南韶州慧能和尚的一派南宗定是非論說遠法師問何故不許普寂禪師稱為南宗和上答為秀和上在日天下學者號此二大師為南能北秀天下知聞因此號遂有南北兩宗普寂禪師實是玉泉學徒實不到韶州今口妄稱南宗所以不許此論中又指出南北兩宗有何不同遠法師問能禪師與秀禪師既是同學教人同不同答言不同又問既是同學何故不同答今言不同者為秀禪師教人凝心入定住心看淨起心外照攝心內證緣此不同心不住內亦不在外如此坐者佛即印可從上六代已來皆無有一人凝心入定住心看淨起心外照攝心內證是以不同此論下文又說遠法師問嵩嶽普寂禪師東嶽降魔藏禪師此二大德皆教人坐禪凝心入定住心看淨起心外照攝心內證指此以為教門禪師今日何故說禪不教人坐不教人凝心入定住心看淨起心外照攝心內證何名坐禪和上答今言坐者念不起為坐今言禪者見本性為禪所以不教人坐身住心入定若指彼教門為是者維摩詰不應訶舍利弗宴坐這是說北宗神秀和他的大弟子都注重坐禪教人凝心入定住心看淨起心外照攝心內證的十六字禪法而慧能神會的南宗是不教人坐身住心入定的這樣說禪不教人坐說禪不在坐裏說念不起為坐見本性為禪在中國的佛教史上實是一種革命印度的禪法從此更簡單化了變成中國禪宗的禪學了南宗定是非論的理論的部分還指出南宗的頓悟教義遠法師問如此教門豈非是佛法何故不許和上答皆為頓漸不同所以不許我六代大師一一皆言單刀直入直了見性不言階漸夫學道者須頓見佛性漸修因緣不離是生而得解脫譬如母頓生子與乳漸漸養育其子智慧自然漸漸增長頓悟見佛性者亦復如是智慧自然漸漸增長這個頓悟的教義神會在別處說的更多看胡適神會傳頁四五四七胡適文存第四集頁二六五二六六我只引他的語録一段發心有頓漸迷悟有遲疾迷即纍劫悟即須臾譬如一綟之絲其數無量若合為繩置於木上利劍一斬一時俱斷絲數雖多不勝一劍發菩薩心人亦復如是若遇真正善知識以諸方便直示真如用金剛慧斷諸位地煩惱豁然曉悟自見法性本來空寂慧利明了通達無礙證此之時萬緣俱絶恆沙妄念一時頓盡無邊功德應時等備神會和尚遺集卷一頁一二一二一這是神會的頓悟說這就是所謂南宗頓教所謂頓教解脫禪門南宗定是非論的主文不過如此所謂為天下學道者定宗旨為天下學道者辨是非其實只是造出向來從沒有人說過的從上相傳一一皆與達摩袈裟為信的法統說作為作戰的武器向當時最有權威的兩京法主三帝國師的神秀門下的普寂和尚作最無情的攻擊神會專取攻勢的戰略是無法抵禦的他數十年鍥而不舍繼續努力奮鬪的精神是很可以感動人的為了爭取法統他是不擇手段的我們看他在此論裏提出唐國以菩提達摩為首西國以菩提達摩為第八代的荒謬說法更可以明白他不擇手段的作風遠師問據何得知菩提達摩在西國為第八代和尚答據禪經序中具明西國代數又可禪師親於嵩山少林寺問菩提達摩西國相承者菩提達摩答一如禪經序所說東晉末年廬山譯出的達摩多羅禪經的序引中提到大迦葉以下八位持法者其中第八位是達摩多羅神會把達摩多羅認作菩提達摩這是認錯了祖宗還可以說是無知的錯誤但他又造出慧可親問菩提達摩的神話那就是有心說大謊了在那個中古宗教狂熱的空氣裏不但傳衣的法統說終于被世人認為歷史事實並且連那個最荒謬的西國代數後來從八代改到二十八代也居然成為人人尊信的西天二十八祖的傳法世系在一千幾百年中竟無人指出這二十八代祖師的傳法世系完全是根據于錯認菩提達摩和達摩多羅是一個人最後我要借這回校寫南宗定是非論的機會來改正我三十年前的一個大錯誤我要重新考定這篇南宗定是非論的年代這就是說我要重新考定神會和尚在滑臺大雲寺定南北兩宗的無遮大會是在開元二十年七三二而不是在開元草二年七三四也不是在開元草一年七三三三十年前我所得的南宗定是非論殘卷有獨孤沛的序文其中就有兩個不同的年代弟子於會和上法席下見與崇遠法師論義便修從開元十八十九草年其論本並不定為修未成言論不同今取草一載本為定我襄陽神會和上於開元草二年正月十五日在滑臺大雲寺設無遮大會廣資嚴飾升師子坐為天下學道者說這兩段的年月互相矛盾很難調和很難解釋初看前一段好像此卷所記應該是開元十八年以前的事至少應該是開元草一年以前的事何以後一段又分明說那個定宗的無遮大會是在開元二十二年正月十五日呢究竟此會在何年呢我當時的意見大致是這樣的記者獨孤沛的文理不明白故敘述不清楚他的意思似是要說他有先後記録神會的書第一部是開元十八年至二十一年的神會語録自十八年修起以草一年本為定略如敦煌寫本神會語録第二部是記録開元草二年神會在滑臺大雲寺和崇遠法師辨論的書即是這本南宗定是非論此段文字是刪改我的跋神會語録第二殘卷原文見神會遺集頁一七一但我現在校寫新出現的南宗定是非論長卷又發現了兩個不同的年代都在此卷後幅的後序和讚裏去開元十二年正月十五日共遠法師論議心地略開動氣陵雲發言驚衆道俗相謂達摩後身所是對問宏詞因即編之為論讚五章的第五章論之興也開元二十此日陵遲今年法立本元清淨非關積習彼岸坐登禪門頓入德超河洛芳流京邑明月孤懸衆星無及我把這四個不同的年代合併起來看我才明白我三十年前的意見是大錯的我現在的結論是這篇南宗定是非論是用開元二十年的本子記的是開元二十年正月十五日滑臺寺定南北兩宗是非的無遮大會上的辨論我的證據是在末幅的第五章讚詞的論之興也開元二十一句這一章韻語共用六韻首韻原作開元草三字此句應該有四個字故可以作開元二十也可以改作開元草一但此章押的是立習入邑及五韻全是中古韻書的二十六緝開元二十恰是緝韻開元草一就不協韻了開元草二當然更是不可能的所以我斷定滑臺定宗旨的大會是在開元二十年正月十五日其餘的三個年代都可以這樣改正今取草一載本為定當改正作今取草載一本為定襄陽神會和上於開元草二年草二是二十年之誤開元十二年正月十五日十二年是二十年的誤寫這樣改正四處都可通了校寫本已照這樣改正了為什麼獨孤沛要說從開元十八十九草年其論本並不定呢難道這三年之中年年都有神會和崇遠法師辨論的大會嗎很可能的崇遠法師是神會和尚請來的一位有訓練的配角這種布道傳教的大會無論古今中外往往有這種受了訓練的配角的很可能的開元十八年和十九年的辨論都只是預備的演習二十年的無遮大會無遮即是露天大會才是正式的表演大會所以獨孤沛今取草載一本為定改年為載是玄宗天寶三年七四四正月開始的獨孤沛序文用草載一本可以使我們知道此論的寫定已在天寶年間了三附記神會和尚的生卒年的新考正神會和尚死在何年死時年若干歲向來傳記對這兩個問題凡有三種不同的答案宋高僧傳的神會傳說他死在上元元年七六的建午月十三日年九十三歲曇噩的新修科分六學傳的神會傳也說他死在上元元年年九十三宗密的圓覺經大疏抄的神會傳說他死在乾元元年七五八五月十三日年七十五景德傳燈録的神會傳說他死在上元元年七六五月十三日與宋僧傳相同但又說他俗壽七十五那就和宗密和宋僧傳都不同了民國十八年一九二九我在荷澤大師神會傳裏曾主張宋僧傳似是依據神會的碑傳比較可信我曾指出王維受神會之託作慧能和尚的碑文唐文粹六十三末段云弟子曰神會遇師於晚景聞道於中年宗密與傳燈録都說神會見慧能時止有十四歲則不得為中年慧能死在先天二年七一三年七十六神會的年歲若依宋僧傳計算他死在上元元年七六年九十三是他生在總章元年六六八當慧能死時他已有四十六歲可以說是遇師於晚景聞道於中年了但我現在覺得宋僧傳說神會死在上元元年的建午月十三日這個年月日是值得我們重新檢討的上元元年沒有建午月乾元元年也沒有建午月止有肅宗最末一年即是那個沒有年號的元年七六二才可以有建午月的名稱因為唐肅宗在上元二年七六一九月壬寅草一日忽然下了一道驚人的諭旨反對改元反對年號他說欽若昊天定時成歲春秋五始義在體元惟以紀年更無潤色至于漢武飾以浮華非前王之茂典豈永代而作則自今已後朕號惟稱皇帝其年號但稱元年去上元之號其以今此下唐書殘闕大意是說其以今年十一月建子為歲首月以斗所建辰為名上元二年十一月改稱建子月十二月改稱建丑月次年舊正月改稱建寅月以下到舊四月改稱建巳月但建巳月十八日丁卯肅宗就死了在他死之前兩天建巳月十六日乙丑他又下詔元年宜改為寶應建巳月為四月餘月並依常數仍依舊以正月一日為首所以那個沒有年號的元年七六一七六二只有六個月還沒有到建午月就改回舊制了當時並沒有追改上元二年七六一五月為建午月更沒有追改上元元年七六五月為建午月但皇帝廢止新曆的詔書是建巳月十六日方下的第三天皇帝就死了太子即位了元年的曆書當然還在通用寶應元年的新曆大概就沒有製作頒布也許就不準備製作頒布了所以全國通用的還是元年每月以斗所建辰為名的曆書所以神會和尚死在洛陽那兒的和尚還記載他的死日為建午月十三日那是絲毫不足奇怪的敦煌寫本裏還保留了一個很有歷史趣味的旁證倫敦巴黎兩處都有一卷很長的寫本題作曆代法寶記收在大正大藏經第五十一冊第二七五件此卷記的是劍南資州德純寺智詵死在長安二年七二傳下來的成都淨衆寺無相和成都保唐寺無住的一派禪宗的歷史無相和上死在寶應元年四月十九日就是那個沒有年號的元年建巳月十九日在曆代法寶記的無住傳裏有這樣的記載至建巳月大正藏本誤作逮已月下同十三日董璿至成都府淨衆寺大正藏誤作淨泉寺為無相和上四體違和輒無人得見元年建巳月十五日改為寶應元年五月當作四月十五日和上遙付囑訖至十九日儼然坐化這裏元年建巳月十五日一條是遠在劍南的一條最好的旁證在一千多年之後大家都忘記了那個沒有年號的元年都忘記了肅宗皇帝那一道反對年號反對改元的空前詔旨於是建巳月就無人懂得就被改作逮巳月了所以我現在猜想神會和尚死的年月日必是元年建午月十三日也可以說是寶應元年七六二五月十三日後人不懂得那個沒有年號的元年所以猜做上元元年或猜做乾元元年其實都是錯的所以我提議改定神會和尚死在肅宗新改的元年的建午月十三日即是寶應元年七六二的五月十三日年九十三歲倒推上去他應該是生在高宗咸亨元年六七而不是生在高宗總章元年六六八民國四十七年十一月二十日在南港中央研究院四總計三十多年來陸續出現的神會遺著現在我們可以把三十多年來先後發見的神會遺著作一個簡表一神會的語録現已出現的有兩本都是敦煌出來的甲胡適校寫巴黎國家圖書館藏的敦煌寫本原編號收在神會和尚遺集卷一民國十九年一九三出版二十年一九三一再版原無題目胡適擬題神會語録乙石井光雄影印他購藏的敦煌寫本昭和七年民國二十一年一九三二石井氏影印二百部願以影本印施功考妣二親成正覺原無題目卷前有題字一行云此文字缺頭後有博覽道人尋本續之矣影印本題燉煌出土神會録附有燉煌出土神會録解說一小冊鈴木貞太郎撰鈴木貞太郎公田連太郎校訂石井光雄本燉煌出土神會録昭和九年一九三四鉛字排印出版石井本尾有題記云唐貞元八年歲在未貞元八年壬申七九二前一年七九一歲在未沙門寶珍共判官趙秀琳於北庭奉張大夫處分令勘訖其年冬十月草二日記其後又有一行題字唐癸巳年貞元八年後的第一個癸巳是元和八年八一三十月草三日比丘記神會死在肅宗廢年號的元年即寶應元年七六二石井本在北庭的校勘題記在貞元八年在神會死後才三十年鈔寫可能還在神會活著的時候胡適本目録分五十章鈴木公田校訂排印本分五十六章其中第一至第四十四章與胡適第六至第四十九章相同中間石井本多出兩章文字互有優劣可以互相校勘胡適本後幅原無殘缺緊接菩提達摩南宗定是非論但石井本第四十四章之後有後來續加的十一章一部分是從南宗定是非論摘鈔而放大的其第四十九章為遠法師問未審禪門有無付屬答語第四十九章至第五十五章約有一千三百字乃是六代大德的小傳其中第六代唐朝能禪師的小傳就有九百多字與敦煌本六祖壇經的慧能自述在弘忍門下一段大略相同但無神秀作偈及慧能作偈的故事敦煌本壇經有慧能臨終的懸記即預言法海向前言大師大師去後衣法當付何人大師言法即付了汝不須問吾滅後二十餘年邪法遼亂惑我宗旨有人出來不惜身命第佛教是非竪立宗旨即是吾正法衣不合傳石井此本的慧能小傳也有同樣的懸記而有小不同法海問曰和上日以後有相承者否有此衣何故不傳和上謂曰汝今莫問以後難起極盛汝欲得知時我滅度後四十年外竪立宗旨者即是此傳與壇經都說慧能死在先天二年八月三日先天二年七一三十二月改元為開元他死後二十餘年正是神會在滑臺大雲寺為天下學道者定宗旨為天下學道者辨是非在開元二十年七三二之後幾年可能這就是所謂六祖壇經的原始部分寫作的時候慧能死後四十年外正當天寶十二年七五三神會被御史中丞盧奕奏劾聚衆疑萌不利因此被敕黜戈陽郡之時可能這就是語録別本的六代大德小傳寫作的時候石井本最後鈴木公石本第五十六章有大乘頓教頌並序不著撰人姓名序中有頌揚神會的一段可算是神會傳記的最早資料我荷澤原作擇和上天生而智似當作知者德與道合願將年並年並二字原誤倒在幼稚科遊方訪道所遇諸山大德問以涅槃本寂之義皆久而不對心甚異之因詣嶺南復遇漕溪尊者作禮未訖已悟師言無住之本自慈而得得原作德王維為神會作能禪師碑述能禪師乃教人以忍曰忍者無生方得無我常歎曰七寶布施等恆河沙億劫修行盡大地墨不如無為之運無礙之慈尊者以為寄金惟少償珠在勳付心契於一人傳法燈原作登于六祖于以慈悲心廣汲引情深昔年九歲已發弘願我若悟解誓當顯說今來傳授遂過先心明示醉人之珠頓開貧女之藏墮疑網者斷之以慧劍溺迷津者濟之以智舟心有生滅法無去來無念則境慮不生無作則攀緣自息或始覺以滅妄或本覺以證真其解脫在於一瞬離循環於三界雖長者子之奉蓋龍王女之獻珠比原作此之於此復速於彼所謂不動意念而超彼岸不捨死生而證泥洹繄原作繫頓悟之致何遠之有釋門之妙咸在茲乎於是省閣簪裾里閈耆耋得無所得聞所未聞疑達摩之再生謂優曇之一現頌聲騰於遠邇法喜妙於康莊二神會的菩提達摩南宗定是非論現已發見的有三本都是敦煌出來的甲胡適校寫巴黎國家圖書館藏的敦煌寫本原編號的第二件收在神會和尚遺集卷二今重新校寫題作菩提達摩南宗定是非論上卷收在集刊本分此殘卷有獨孤沛序乙胡適校寫巴黎國家圖書館藏的敦煌寫本原編號收在神會和尚遺集卷三此殘卷無頭無尾中間又脫去一紙新發見的巴黎長卷丙內有此卷全文又可補此卷脫文六百字丙胡適新校寫巴黎國家圖書館藏的敦煌寫本原編號的第一件此卷經過整理校寫之後可以考定為敦煌石窟裏保存的南宗定是非論的第三個寫本其首一段和甲卷的末一段相同可以互相校勘故此卷可以說是恰好和甲卷相銜接此卷內又有乙卷的全文及乙卷殘脫的一紙六百字此卷最後有後序及讚五章大概也是獨孤沛的手筆末一行題菩提達摩南宗定是非論一卷甲卷有頭丙卷有尾兩卷又恰相銜接故南宗定是非論的全部大概都在這裏了丙卷今收在集刊本分題作菩提達摩南宗定是非論下卷三南陽和尚頓教解脫禪門直了性壇語一卷現已發見的有兩本都是敦煌出來的甲鈴木貞太郎鈴木大拙校寫北平國立北平圖書館藏的敦煌寫本收在鈴木編印的少室逸書昭和十一年一九三六出版此卷首尾完整但原題殘失南陽兩字僅存和上頓教解脫禪門直了性壇語十三字鈴木先生在他的少室逸書解說裏已指出此篇壇語的思想與神會語録相近也與六祖壇經相近乙胡適校寫巴黎國家圖書館藏的敦煌寫本原編號的第二件即集刊本分所收此卷原題南陽和上頓教解脫禪門直了性壇語其內容思想都可以和神會語録的主要思想相印證故可以定為神會在南陽時期的講演録此卷的鈔寫往往遠勝甲本但甲本也可供參校此卷之後有南宗定邪正五更轉五章後附五言律詩一首其思想和南陽和上壇語頗相同故我收作壇語的附録四頓悟無心般若頌又叫作荷澤大師顯宗記現存三本甲景德傳燈録卷三十收的荷澤大師顯宗記全唐文所收神會顯宗記即是根據傳燈録乙矢吹慶輝影印倫敦英國博物院藏的敦煌寫本頓悟無生般若頌原編號收在矢吹慶輝編的鳴沙餘韻的第七十八版鳴沙餘韻是矢吹博士影印的二百三十件倫敦英國博物院藏的敦煌寫本佛教珍篇佚書昭和五年民國十九年一九三十月出版此本有頭而無尾殘存二十行首題頓悟無生般若頌丙胡適校寫倫敦英國博物院藏的敦煌寫本頓悟無生般若頌原編號收在神會和尚遺集卷四民國十九年一九三四月出版此本有尾而無頭殘存三十一行尾題頓悟無生般若訟頌一卷我在民國十五年一九二六在倫敦發見此殘葉偶然認得其中所傳祕教意在得人如王繫髻珠終不妄與一句話好像是我讀過的荷澤大師顯宗記的文字後來翻檢景德傳燈録卷三十收的顯宗記與敦煌殘葉對照我才考定這幾葉頓悟無生般若頌是神會的顯宗記的最古本的後半篇看神會和尚遺集頁二二八我當時鈔了這殘卷後來用顯宗記補了殘缺的前面二百三十三字又詳記後半篇敦煌本與傳燈録本的異同寫作神會遺集的第四卷我當時沒有夢想到頓悟無生般若頌的前半篇也在英國博物院裏被編作號在前一年一九二五已被日本的矢吹慶輝博士照了相片帶回東京去了昭和五年一九三矢吹先生印行他的鳴沙餘韻只有圖版一百零四幅而沒有解說目録裏並沒有記出那寥寥二十行的頓悟無生般若頌兩年之後民國二十一年昭和七年一九三二矢吹博士寫他的鳴沙餘韻解說時他已讀了我的神會和尚遺集已見了我校寫的頓悟無生般若頌和我的短跋了所以他在解說第二部頁五三六五三七裏特別提到那寫在無心論一卷之後的頓悟無生般若頌二十行還引我的短跋說此頌即是神會的顯宗記說此頌無西天二十八祖的話而有傳衣之說故我推測似此頌真出於神會之手可能是顯宗記的原本但矢吹博士當時不曾仔細分析我用顯宗記補了二百三十三字的此頌全文他沒有注意到我的校補本只有後面的三百十二字是倫敦鈔來的敦煌寫本他誤把那補全的五百多字都看作倫敦的號了所以他說斯坦因所搜集的寫本題作頓悟無生般若頌的至少有兩本一第二九六號鈔在無心論之後二第四六八號首有關尾題頓誤無生般若訟一卷兩相對比異句異字不少而一相當於二的首部他又說對照一二二比一增出頗多故近於顯宗記若二為一之原形一更可認為二的稿本我在今年十一月中才得讀矢吹先生的解說我試把他的圖版第七十八版的二十行頓悟無生般若頌校寫出來方才發見他在三十三年前照相的二十行正是我在三十二年前校寫的三十一行的前半篇這五十一行原是一篇鈔在六葉粗紙上每葉摺成兩半前面的兩葉半編作號被矢吹慶輝先生照了相片影印在鳴沙餘韻裏了後面的三葉半脫落了被編作號被我鈔寫了校印在神會和尚遺集第四卷裏矢吹本末句到用而兩字為止胡適本開頭是不有二字合起來正是用而不有一句這兩個殘本合併起來正是一篇完整的頓悟無生般若頌矢吹先生說的一相當於二的首部本來不錯他又說兩相對比異句異字不少二比一增出頗多那就大錯了一即乙與二即丙是一篇的前後兩半故沒有異句異字可以互校這篇敦煌寫本頓悟無生般若頌的前後兩半分開太久了我現在把他們重新合併寫定使神會的顯宗記的最古寫本的原來面目可以重見於世間因為字數不多我鈔在這裏做一個附録顯宗記有傳燈録和全唐文兩個通行本我把異文詳細記在神會遺集頁一九三一九九裏可以不鈔在這裏了附録敦煌寫本頓悟無生般若頌的全文頓悟無生般若頌無念是實相真空知見是無生般若般若照真達俗真空理事皆如此為宗本也夫真如無念非念想能知想字原作相知字原作之顯宗記作真如無念非想念而能知今據校改實相無生豈生心能見無念念者則念總持無生生者則生實相無住而住常住涅槃無行而行能超彼岸如如不動動用無窮念念無求求常無念上求字原作來從顯宗記改菩提無得得佛法身般若無知知一切法即定是慧即慧無生無生實相真空無行能周法界六度自茲圓滿道品於是無虧我法二空有無雙泯不到不至不去不來體悟三明心通八解成功十力富有七財十字原作不從顯宗記改入不二門權一乘理湛然常寂應用無方用而無功空而常鑒用而此上為號殘本此下為號殘本不有即是真空空而不無玄知妙有妙有則摩訶般若真空即清淨涅槃般若通祕微之光實相達真如之境般若無照能照涅槃涅槃無生能生般若涅槃般若名原作我從顯宗記改異體同隨義立名法無定相涅槃能生般若即名具佛法身原作涅槃能見般若具佛法僧今參考顯宗記校改但顯宗記作真佛法身按具字也可通故留備一本般若圓照涅槃故號如來知見知即知常空寂見即直見無生知見分明不一不異動寂俱妙理事皆如理靜原作淨處事能通達事理通無礙六根無染定慧之功相念不生真如性淨覺滅心空一念相應頓超凡聖無不能無有不能有行住坐臥心不動搖一切時中空無所得三世諸佛教指如斯斯字原作如從顯宗記改菩薩大悲轉相傳受至於達摩屆此為初遞代相傳於今不絶所傳祕教意在得人如王髻原作繫從顯宗記改珠終不妄與福德智慧二種莊嚴解行相應方能建立衣為法言法是衣宗衣法相傳更無別付非衣不弘於法非法不受於衣衣是法信之衣法是無生之法無生既無虛妄法是空寂之身知空寂而了法身而真解脫頓悟無生般若頌一卷四十七年十一月草二日夜補記轉載自中央研究院歷史語言研究所集刊二十九本
