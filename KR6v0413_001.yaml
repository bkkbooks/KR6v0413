body:
  text: 目次一南陽和上頓教解脫禪門直了性壇語附録南宗定邪正五更轉二菩提達摩南宗定是非論上卷三菩提達摩南宗定是非論下卷四校寫後記一校寫南陽和上頓教解脫禪門直了性壇語後記二校寫菩提達摩南宗定是非論後記三附記神會和尚的生卒年的新考正四總計三十多年來陸續出現的神會遺著附南陽和上頓教解脫禪門直了性壇語敦煌寫本照片一南陽和上頓教解脫禪門直了性壇語此卷依據的底本是巴黎國家圖書館藏的伯希和敦煌寫本號卷子的第二件原題為南陽和上頓教解脫禪門直了性壇語其中脫去了一紙三十一行錯黏在那個卷子的第一件菩提達摩南宗定是非論的中間現在我已改正了這個卷子省稱底本校寫此卷時我曾用日本鈴木貞太郎從國立北平圖書館藏的敦煌寫本校寫的和上頓教解脫禪門直了性壇語來比勘鈴木先生在一九三四年發見這一卷壇語他用胡適本神會和尚遺集鈴木和公田本神會禪師語録及敦煌寫本六祖壇經做參考比較的資料指出壇語的思想傾向最接近神會也最接近六祖壇經看鈴木貞太郎校刊少室逸書及解說的解說頁五六八巴黎出現的壇語的標題沒有殘缺正作南陽和上即是在南陽時期的神會開元八年七二他奉勑配住南陽龍興寺見宋高僧傳他在南陽約有十年所以人稱他南陽和尚這個北平本壇語很多脫文誤字遠不如巴黎本但也有參校的大用處例如那誤黏在別的文件的一紙三十一行若沒有這個首尾完全的北平本比勘就無法證實我的校稿是不錯的了這個北平本省稱平本鈴木先生校寫壇語把全篇分成三十九章其中頗多錯誤的分割我這回寫定此篇暫且分寫作八大段其中必定也還有不妥當的分割胡適記一無上菩提法諸佛深歎不思議知識既一一平本此二字作今能來各各發無上菩提心諸佛菩薩真正善知識極甚難值遇昔未曾聞今日得聞昔未得遇今日得遇涅槃經云佛告迦葉言從兜率天放一顆芥子投閻浮提一針鋒是為難不迦葉菩薩言甚難世尊佛告迦葉此未為難正因正緣得相值遇此是為難云何正因正緣知識發無上底本脫此二字平本補菩提心是正因諸佛菩薩真正善知識將無上菩提法投知識平本脫此九字心得究竟解脫是正緣得相值遇為善知識是凡夫神會各卷中用是字或所是在名詞之前有諸字義如所是門徒即諸門徒是凡夫即所是凡夫即諸凡夫口有無量惡言心平本脫此六字有無量惡念久輪轉生死不得解脫須一一平本脫此三字自發菩提心為知識懺悔各各禮佛敬禮過去盡過去際一切諸佛敬禮未來盡未來際一切諸佛敬禮現在盡現在際一切諸佛敬禮尊法般若平本般若在尊法上修多羅藏敬禮諸大菩薩一切賢聖僧各各至心懺悔令知識三業清淨過去未來及現在身口意業四重罪我今至心盡懺悔願罪除滅永不起過去未來及現在身口意業五逆罪我今至心盡懺悔願罪除滅永不起過去未來及現在身口意義七逆罪我今至心盡懺悔願罪除滅永不起平本七逆在五逆之前過去未來及現在身口意業十惡罪我今至心盡懺悔願罪除滅永不起過去未來及現在身口意業障重底本此三字作業業障重四字罪我今至心盡懺悔願罪除滅永不起過去未來及現在身口意業一切罪我今至心盡懺悔願罪除滅永不起平本脫此四句二十八字現在知識等今者已能來此道場各各發無上菩提心求無上菩提法若求無上菩提須信佛語依佛教佛道沒語底本道上有說字經云諸惡莫作諸善奉行自淨其意是諸佛教過去一切諸佛皆作如是說諸惡莫作是戒諸善奉行是慧自淨其意是定知識要須三學等始名佛教何者是三學等戒定慧是妄心不起名為戒無妄心名為定知心無妄名為慧是名三學等各須護持齊戒若不持平本作能齊戒一切善法終不能生若求無上菩提要先平本作須護持齊戒乃可得入若不持齊戒疥癩野干之身尚自不得豈獲如來功德法身知識學無上菩提不淨三業不持齊戒言其得者無有是處要藉有作戒有作慧顯無作戒無作慧兩本皆無戒無作三字定則不然若修有作定即是人天因果不與無上菩提相應知識久流浪生死經過恆河沙大劫不得平本脫得字解脫者為不曾發無上菩提心即不值遇諸佛菩薩真正善知識縱值遇諸佛菩薩真正善知識又復不能發無上菩提心流轉生死經無量恆河沙大劫不得解脫者總緣此二又縱發心者只發二乘乘字平本作種家二字以下二乘皆作二家人天心人天福盡不免還墮諸佛出世如恆河沙諸大菩薩出世如恆河沙一一諸佛菩薩善知識出度人皆如恆河沙諸佛菩薩善知識何不值遇今流浪生死不得解脫良為與過去諸佛菩薩真正善知識無一念最上底本無此二字菩薩緣來或有善知識不了無上菩提法儻將二乘聲聞及人天法教知識喻如穢食置於寶器何者寶器平本脫此四字知識發無上菩提心是寶器何者穢食二乘人天法是穢食雖獲少善生天天底本作之福若盡還同今日凡夫知識今發心學般若平本脫此二字波羅蜜相應之法超過聲聞緣覺等同釋迦牟尼佛授彌勒記更無差別平本此四字作亦更無別如二乘人執定經歷劫數如須陀洹在定八萬劫斯陀含在定六萬劫阿那含在定四萬劫阿羅漢在定二萬劫辟支佛在定十千劫何以故住此定中劫數滿足菩薩摩訶薩方乃投機說法能平本作然始發菩提心同今日知識發菩提心不別當二乘在定時縱為說無上菩提法終不肯領受經云天女語舍利弗云凡夫於佛法平本脫此三字有返覆而聲聞無也已來登此壇場學修般若波羅蜜時願知識各各心口發無上菩提心不離坐下悟平本作信中道第一義諦夫求解脫者離身意識五法三自性八識二無我離內外見亦不於三界現身意是為宴坐如此坐者佛即印可六代祖師以心傳心離文字故從上相承亦復如是平本脫上字亦字知識一一身具有佛性善知識不將佛菩提法與人亦不為人安心何以故涅槃經云早已授仁者記此一段兩本皆有寫者誤改處二人字兩本皆作人者鈴木皆改作仁者經文仁者兩本皆作人者安下平本有心字底本無大概寫者因經文誤作人者故誤改上文兩人字作人者就不可讀了鈴木改經文為仁者是不錯的他改上文兩仁者就錯了今校正一切衆生本來涅槃無漏智性本自具足何為不見今流浪生死不得解脫為被煩惱覆故不能得見要因善知識指授方乃得見故即離流浪生死使得解脫三知識承前所有學處且除却莫用看平本脫用字知識學禪以來經五年十餘年二十年者今聞深生驚怪所言除者但除妄心不除其法若是正法十方諸佛來平本作未除不得況平本作說今善知識能除得猶如人於虛空中行住坐臥不離虛空無上菩提法亦復如是不可除得一切施為運用皆不離法界經云但除其病不除其法知識諦聽為說妄心何者是妄心仁兩本皆作人者等今既來此間貪愛財色男女等及念園林屋宅此是麁妄應無此心為有細妄仁者不知何者是細妄此上九字平本脫心聞說菩提起心取菩提聞說涅槃起心取涅槃聞說空起心取空聞說淨起心取淨聞說定起心取定此皆是妄心亦是法縛亦是法見若作此用心不得解脫平本若字上用字上皆有心字非本自寂淨心作住涅槃被涅槃縛住淨被淨縛平本脫此五字住空被空縛住定被定縛作此用心皆是障菩提道般若經云若心取相即著我人衆生壽者離一切諸相即名諸佛離其法相相平本作想維摩經云何為病本為有攀緣云何斷攀緣以無所得無所得則無病本無所得三字底本兩處皆作無所有得故五字平本無有字又無下無所得故四字今依維摩詰經改學道若不識細妄如何得離生死大海知識各用心諦聽聊簡自本清淨心下文有聊簡煩惱即菩提義聊簡也寫作料簡有檢討的意思聞說菩提不作意取菩提聞說涅槃不作意取涅槃聞說淨不作意取淨聞說空不作意取空聞說定不作意取定如是用心即寂靜平本作最靜涅槃經平本脫此字云斷煩惱者不名涅槃煩惱不生乃名涅槃譬如鳥飛於虛空若住於空必有墮落之患依平本增虛字住下增於字如學道人修無住心心住於法即是住著不是解脫經云更無餘病唯有空病無空病亦空所空亦復空此十字平本作空病亦空又復六字經云常行平本作求無念實相智慧若以法界證法界者即是增上慢人四知識一切善惡總莫思量不得凝心住心亦不得將心直視心墮底本作隨下同直視住不中用不得垂平本作睡眼向下便墮眼住不中用不得作意攝心亦不得二本皆作復遠看近看皆不中用經云不觀是菩提無憶念故即是自性空寂心平本無心字心有是非不答無心有來去處不底本心字下衍有住處不四字答無心有青黃赤白不答無心有住處不答心無住處和上言心既無住知心無住不答知知不知答知平本脫知字今推到無住處立知作沒作沒怎麼無住是寂靜中古寫本淨靜不分此處從平本作靜下同寂靜體即名為定平本脫寂靜二字又脫為字從體上有自然智能知本寂靜體名為慧平本脫從字皆作知此是定慧等經云寂上起照此義如是無住心不離知知不離無住知心無住更無餘知此十九字平本作無住心不離知知不離無心即無住更無餘知故不可讀涅槃經云定多慧少增長無明慧多定少增長邪見定慧等者明見佛性今推到無住處便立知知心空寂即是用處法華經云即同如來知見廣大深遠心無邊際同佛廣大心無限量同佛平本脫佛字深遠更無差別看平本作者諸菩薩行甚深般若波羅蜜多佛推諸菩薩病處如何般若經云菩薩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心應無所住而生其心平本應下脫無所住而生其心七字而衍此並用三字此三個衍文是原有的校記意指無所住等字須重復一遍後來鈔手誤收旁注三字作正文無所住底本脫此三字者今推知識無住心是而生其心者知心無住是此節兩本各有脫文故不可讀鈴木先生所依北平本有脫文又有衍文他沒有用金剛般若經來校補脫文故他的校本作應此並用無所住者今推知識無住心如是而生其心者以上屬于他分寫的第二十一章以下另起第二十二章知心無住是本體空寂如此分割甚不可讀本體空寂從空寂體上起知善分別世間青黃赤白是慧不隨分別起是定即如凝心入定墮無記空平本作即疑如心入定隨無既空出定底本作後空依平本改已後起心分別一切世間有為喚此為慧經中名為妄心平本脫有為的為字又脫慧經中名為五字此則慧時則無定定時則無慧如是解者皆不離煩惱凝心入定住心看淨起心外照攝心內證非解脫心亦是法縛心不中用凝心入定住心看淨起心外照攝心內證此四句十六字屢見于神會遺著據菩提達摩南宗定是非論此四句是神秀門下普寂與降魔藏二大師教人的禪法四句最末一字兩本皆作澄今校改涅槃經云佛告琉璃光菩薩善男子汝莫入甚深空定何以故令大衆鈍故此是大般涅槃經高貴德王菩薩品一之文經文南北本皆作汝今莫入甚深空定何以故大衆鈍故底本平本皆作汝莫作入甚深今據經文刪作字補空定二字令大衆鈍故底本平本皆有令字甚有趣味神會在八世紀看見的經文可能有令字所以我沒有敢刪去若入定一切諸般若波羅蜜不知故此一句是神會解釋令大衆鈍故的經文但自知本體寂靜底本作淨空無所有亦無住著等同虛空無處不遍即是諸佛真如身真如是無念之體以是義故立無念為宗若見平本脫見字無念者雖具見聞覺知而常空寂即戒定慧學一時齊等萬行俱備即同如來知見廣大深遠云何深遠以不見性故言深遠若了見性即無深遠此二十字含有一個很大膽的思想可惜沒有發揮五各各至心令知識得頓悟解脫若眼見色善分別一切色不隨分別起色中得自在色中得解脫色塵三昧足耳聞聲善分別一切聲不隨分別起聲中得自在聲中得解脫聲塵三昧足鼻聞香善分別一切香不隨分別起香中得自在香中得解脫香塵三昧足舌嘗味善分別一切味不隨分別起味中得自在味中得解脫味塵三昧足身覺種種觸善能分別觸不隨分別起觸中得自在觸中得解脫觸塵三昧足意分別一切法不隨分別起法中得自在法中得解脫法塵三昧足如是諸根善分別是本慧不隨分別起是本定經云云字兩本同作中按下文不捨道法而現凡夫事是引維摩詰經故校改不捨道法而現凡夫事是為宴坐種種運為世間不於事上生念是定慧雙修不相去離定不異慧慧不異定如世間燈光不相去離此十七字平本重出即燈之時光家禮即光之時燈家用即光之時不異燈即燈之時不異光即光之時不離燈即燈之時不離光即光之時即是燈即燈之時即是光定慧亦然即定之時是慧體即慧之時是定用即慧之時不異定即定之時不異慧即慧之時即是光即定之時即是慧即慧之時無有慧即定之時無有定此即定慧雙修不相去離後二句者是維摩詰默然直入不二法門直入底本作入真平本作入直鈴木校改作直入維摩詰經入不二法門品云時維摩詰默然無言文殊師利歎曰善哉善哉乃至無有文字語言是真入不二法門玄奘譯本末句作是真悟入不二法門於中都無一切文字言說分別中古寫本直真二字往往互混此篇標題是頓教解脫禪門直了性壇語而此章特別說頓悟解脫故我從鈴木校作直入六為知識聊簡煩惱即菩提義舉虛空為喻如虛空本無動靜明來是明家空暗來是暗家空暗空不異明明空不異暗此十字平本脫上七字虛平本脫虛字空明暗自來去虛空本來平本脫來字無動靜煩惱與菩提其義亦然迷悟雖底本脫雖字別有殊菩提性元不異經云如自觀身實相觀佛亦然知心底本脫心字無住是觀過去諸佛心亦同知識今日無住心無別經云我觀如來前際不來後際不去今則無住夫平本作未求法者不著佛求不著法求不著衆求此十六字也是引維摩詰經文何以故為衆生心中各自底本脫自字有佛性故知識此二字平本作若起心外求者即名邪求勝天王般若經兩本皆脫此三字言大王即是如實世尊云何如實平本脫此六字大王即平本脫即字不變異世尊云平本脫云字何不變異大王所謂如如世尊云何如如大王此可智知非言能說平本作說能離相無相遠離思量過覺觀境是為菩薩了達甚深法界即同佛知見知識自身中有佛性未能了了見何以故喻如此處各各思量家中住宅衣服臥具及一切等物具知有更不生疑此名為知不名為見底本此下脫去一紙自若行到宅中起至若於師處受得禪法所學各自平章的各字止共三十一行此一紙三十一行誤黏在菩提達摩南宗定是非論一卷裏今移正平本不脫可以參證若行到宅中見如上所說之物見字兩本皆作具今按當作見平本如字作知又脫所字即名為見不名為知今所覺底本作學者具依他說知身中有佛性未能了了見但不作意心無有起是真無念畢竟見不離知知不離見一切衆生本來無相今言相者並是妄心心若無相即是佛心若作心不起是識定亦名法見心自性定馬鳴云若有衆生觀無念者則為佛智故今所說般若波羅蜜從生滅門頓入真如門更無前照後照遠看近看都無此心乃至七地以前底本脫前字菩薩都總驀過唯指佛心即心是佛七經云當如法說口說菩提心無住處口說涅槃心唯寂滅口說解脫心無繫縛向來指知識無住心知不知答知涅槃經云此是第一義空若三處俱空即是本體空寂平本脫即是本體空五字唯有中道亦不在其中中道因邊而立平本脫中字而字猶如三指並同要因兩邊始立中指若無兩邊中指亦無經云虛空無中邊諸佛身亦然諸佛解脫法身亦如虛空無中邊知識常須作如是解今將無上道法分付知識引經此二字兩本同似是衍文若領此語六波羅蜜恆沙諸佛八萬四千諸三昧門一時灌入知識身心維摩經云菩提不可以身得不可以心得寂滅是菩提滅諸相故不可以身得心不在外不可以心得身平本脫身字不在內寂滅是菩提中間無處所滅諸相故一切妄念不生此照體獨立神無方所知識當如是用得平本無得字上根上智人見說般若波羅蜜便能領受如說修行如中根人雖未得若勸咨問亦得入下根人但至信不退當來亦能入大乘平本作家十信位中只如學道人底本脫人字撥妄取淨是垢淨非本自淨平本垢作恬華嚴經云譬如拭巾有垢先著灰汁然後用淨水洗之此雖得淨未名為淨何以故此淨為因垢得淨猶故不淨維摩經云非垢行非淨行是菩薩行知識非用心時若有妄起思憶遠近不須攝來何以故去心既是病攝來還是病去來皆是病底本脫此病字經云諸法無來去法性遍一切處故法無去來若有妄起即覺覺滅底本脫滅字即是本性無住心有無雙遣境智俱亡平本遺作遠莫作意即自性菩提平本莫上有俱字若微細心即用不著本體空寂無有一物可得是名阿耨菩提阿耨即無上維摩經云從無住本立一切法菩薩光戒光亦復如是自性空寂底本脫寂字無有形相發心畢竟二不別如是二心先心難自未得度先度他是故敬禮初發心初發已為天人師勝出聲聞及緣覺如是發心過三界是故得名最無上此八句又見於南宗定是非論諸家借問隱而不說我於此門都不如是多人少人並皆普說若於師處受得禪法所學各自上文若行到宅中起至此句所得各止共一紙三十一行底本脫失誤收在菩提達摩南宗定是非論一卷裏今移正平本不誤自平章唯通其心若心得通一切經論義底本無論字平本無義字無不通者佛在日亦有上中下衆生投佛出家過去諸佛說法皆對八部衆說不私說不偷說譬如日午時無處不照如龍王降雨平等無二一切草木隨類受潤諸佛說法亦復如是皆平等心說無分別心說上中下衆各自領解經云佛以一音演說法衆生隨類各自解平本脫類字又自字作得字知識若學般若波羅蜜須廣讀大乘經典見諸平本脫諸字教禪者不許頓悟要須隨方便始悟此是大下品之見神會此篇題作頓教解脫禪門直了悟壇語他主張頓悟故他反對當時教禪者不許頓悟之說明鏡可以鑒容平本作監客大乘平本作家下同經可以正心第一莫疑依佛語當淨三業方能入得大乘此頓門一依如來說修行必不相誤平本作悟勤作功夫有疑者平本無者字來相問好去民國四十七年一九五八八月草九日校寫畢胡適記南陽和上頓教解脫禪門直了性壇語的附録南宗定邪正五更轉底本壇語之後有南宗定邪正五更轉歌共五章又五言律詩一首可能都是神會和尚的作品五更轉的主旨如第四章法身體性不勞看看則住心便作意作意還同妄想善惡不思即無念如第三章譏笑處山谷住禪林入空定便凝心一坐還同八萬劫只為檐麻不重金如第一章妄想真如不異居無作無求是功夫等等都是壇語裏的主要思想我校寫壇語之後開始校寫五更轉我覺得這兩個文件是彼此互相發明的例如五更轉第二章一坐還同八萬劫坐字原作生我依據壇語裏說的須陀洹在定八萬劫斯陀含在定六萬劫一段校改生字作坐這一章就成了有趣味的諷刺文學了又如壇語裏有兩句很驚人的話以不見性故言深遠若了見性即無深遠試看五更轉第四章法身體性不勞看看則住心便作意作意還同妄想團這都是譏評當時的禪學大師教人凝心入定住心看淨的方法因為這些緣故我頗傾向于承認這兩篇韻文也是神會和尚的作品我把這兩件鈔在這裏做附録胡適南宗定邪正五更轉一更初妄想真如不異居迷則真如是妄想悟則妄想是真如念不起更無餘見本性等空虛有作有求非解脫無作無求是功夫二更催大圓寶鏡鎮安臺衆生不了攀緣病由斯障閉不心開本自淨沒塵埃無染著絶輪回諸行無常是生滅但觀實相見如來三更侵如來智慧本幽深唯佛與佛乃能見聲聞緣覺不知音處山谷住禪林入空定便凝心一坐原作一生胡適校改還同八萬劫只為擔麻不重金壇語說須陀洹在定八万劫斯陀含在定六万劫阿那含在定四万劫住此定中劫數滿足發菩提心同今日知識發菩提心不別在定中八万劫結果還同今日凡夫一樣這是神會很嚴厲的批評當時的禪學若作一生還同八万劫就沒有意思了四更蘭法身體性不勞看看則住心便作意作意還同妄想團放四體莫攢玩任本性自公官善惡不思即無念無念無思是涅槃五更分菩提無住復無根過去捨身求不得吾師普示不忘原作望恩施法藥大張門去障膜豁浮雲頓與衆生開佛眼皆令見性免沉淪真乘實罕遇至理信幽深欲離相非相還將心照心髻中珠未得衣裏寶難尋為報檐麻者如何不重金民國四十七年一九五八八月草九日校寫完畢胡適記二菩提達摩南宗定是非論上卷這是伯希和從敦煌取去的唐寫本號卷子的後幅我在一九二六年九月十八日發見這個卷子其前幅我已收作神會和尚遺集卷一民國十九年九三上海亞東圖書館初版頁九九一五二後幅有標題一行菩提達摩南宗定是非論一卷並序獨孤沛撰這殘卷雖有修論者獨孤沛的主名因為內容還是神會和尚和崇遠法師的問答論辨的記録所以我收作神會和尚遺集卷二亞東初版頁一五九一六七今年我用巴黎的號卷子寫定了菩提達摩南宗定是非論的下卷所以我又用號卷子的照片重新校寫一遍作為這一卷富有歷史趣味的菩提達摩南宗定是非論的上卷一九五八八草四胡適菩提達摩南宗定是非論一卷并序獨孤沛撰弟子於會和上法席下見和上與崇遠法師諸論義便修從開元十八十九草年其論本並不定為修未成言論不同今取草載一本為定二十載一本原作二十一載本神會遺集二同今改正後有師資血脈傳亦在世流行歸命三寶法法性真如藏真身及應身救世大悲者宗通立宗通如月處虛空唯傳頓教法出世破邪宗問曰有何因緣而修此論答曰我聞心生即種種法生心滅即種種法滅者一切由己妄己即凡古聖皆染便諍果世情逐塊修無生以住生學人迷方欲不動而翻動是非標競差等其了議以上文字不甚可解了議似當作了義此卷中義議往往互混如首句論議即論議即我襄陽神會和上悟無生法忍得無礙智說上乘法誘諸衆生教道衆生教道回向者若百川赴海於開元草年原作二十二年遺集二同今改正正月十五日在滑臺大雲寺設無遮大會廣資嚴飾升師子坐為天下學道者說梁朝婆羅門僧學菩提達摩是南天竺國國王第三子少小出家智惠甚深於諸三昧獲如來禪遂乘斯法遠涉波潮至於梁武帝武帝問法師曰朕造寺度人造像寫經有何功德不達摩答無功德武帝凡情不了達摩此言遂被遣出達摩行至魏朝便遇惠可惠可時年四十此四字原作時卅二字續僧傳記惠可初遇達摩年登四十敦煌本歷代法寶記作時年卌故遺集二校記說亦當作時卌神會遺集出版後兩年日本石井光雄影印他得到的敦煌寫本神會語録殘卷其內容和我校印的神會和上遺集卷一多相同但其末後部分有六代祖師小傳其中可禪師小傳說他時年卌奉事達摩故照改作時年四十俗姓姬武牢人也武牢即虎牢唐朝人避諱改虎作武石井本神會語録作俗姓周武漢人也遂與菩提達摩相隨至嵩山少林寺達摩說不思議法惠可在堂前立其夜雪下至惠可腰原作要惠可立不移處達摩語惠可曰汝為何此間立惠可涕淚悲泣曰和上從西方遠來至此意欲說法度人惠可今不憚損軀志求勝法唯願和上大慈大悲達摩語惠可曰我見求法之人咸不如此惠可遂取刀自斷左臂置達摩前達摩見之曰汝可在先字神光因此立名遂稱惠可字原作自依石井本改惠可深信堅固棄命損身志求勝法喻若雪山童子捨身命以求半偈雪山童子也稱雪山菩薩捨身命以求半偈的故事見于大般涅槃經的聖行品第七之四達摩遂開佛知見以為密契便傳一領袈裟以為法信授與惠可惠可傳僧璨唐人碑版記此世系第三代多作僧璨唐人寫本璨字多寫成㻮字㻮傳道信道信傳弘忍弘忍傳惠能六代相承連綿不絶又見會和上在師子座上說菩提達摩南宗一門天下更無人解若有解者我終不說今日說者為天下學道者辨其是非為天下學道者定其宗旨原作定其定其旨見遺集二寫作定其旨見此論下卷有我自料簡是非定其宗旨的話故我校改定其宗旨見字改屬下句見有如此不思議事甚為奇矚君王有感異瑞來祥正法重興人將識本所以修論以上似是獨孤沛的序以下似是定是非論本文于時有當寺崇遠法師者先兩京名播海外知聞處於法會詞若湧泉所有問語實窮其原提婆之後蓋乃有一時人號之山東遠豈徒然耶原作耳遠法師乃於是日來入會中揚眉亢聲一欲戰勝即時人侶卷屏風稱有官客擬將著侍此句前六字我得的兩次照片都糢糊不可讀一九四九年法國先生用法文翻譯神會和尚遺集四卷在河內出版其一一一一一二頁附有胡適校寫本正誤表表中有此句校作即時人侶卷屏風稱有官客擬將著侍親校原卷補改如此但仍不很可懂和上言此屏風非常住家者何乃拆破場將用祇承官客于時崇遠法師提和上手而訶曰禪師喚此以為莊嚴不和上答言是遠法師言如來說莊嚴即非莊嚴和上言經文原作云校改所說不盡有為不住無為法師重徵以何者不盡有為不住無為和上答不盡有為者從初發心坐菩提樹成正等覺至雙林入涅槃於其中一切法悉皆不捨即是不盡有為不住無為者修學空不以空為證修學無作不以無作為證即是不住無為法師當時無言良久乃語法師曰淫怒是道不在莊嚴和上語法師見在俗人應是得道者遠法師言何故指俗人以為得道和上言法師所言淫怒是道俗人並是行淫欲人何故不得道遠法師問禪師解否和上答解法師言解是不解和上言法華經云吾從成佛以來經無量無邊阿僧祇劫應是不成佛亦應不經無量無邊阿僧祇劫遠法師言此是魔說和上言道俗總聽從京洛已來至于海隅相傳皆許遠法師解義聰明講大乘經論更無過者今日遠法師喚法華經是魔說未審何者是佛說法師當時自知過甚對衆茫然良久欲重言和上言脊梁著地何須重起和上語法師神會今設無遮大會兼莊嚴道場不為功德為天下學道者定宗旨為天下學道者辨是非和上言神會若學即是法師法師若學神會經三大阿僧祇劫不能得成此節中空四字遺集二寫作灠機先生校補空白二字作告不還是不可懂今年我細看巴黎寄來的照片越看越不懂所以我把這四個字都改成空格第一個字可能是濫字本來神會這兩句話都是謾罵可能他用的是當時的土話在一千二百年後就不可懂了和上出語左右慚惶相顧無色然二大士雖原作誰相詰問並皆立而未坐所說微妙尚未盡情時乾光法師亦師僧中之一見遠論屈意擬相挾乃命是人令置牀機更請竪宗重開談論遂延和上及遠法師坐此句中是人校改作侍人我主張仍依原文作是人此論用是字往往是唐人白話的用法如下卷說所是門徒若為修道即是諸門徒那麼修道又如所是偷者皆偷不得即是諸偷者皆偷不得此處是人似即所是人即諸人八世紀的牀機即是我們今日的椅子子乾光法師叫大家安排牀機要神會和崇遠坐下也許還要那四十多個大和尚都坐下其餘聽衆大概還是席地而坐和上平生清禪與物無競此四字原作與物無物無競六字縱欲談論辭讓久之于時有府福先寺師荷澤寺法師及餘方法師數十人齊聲請禪師坐咸言禪師就坐今日正是禪師辨邪正定是非日此間有四十餘箇大德法師論師為禪師作證義在和上固辭不得已時乃就坐然明鏡不疲於屢照清流豈禪於風激勝負雖則已知衆請固將難免和上以無疑慮此日當仁不讓此處語氣似未完暫補不讓二字遠法師重問曰禪師用心於三賢十聖四果人等今在何地位和上言在滿足十地位遠法師言初地菩薩分身百佛世界二地菩薩分身千佛世界乃至十地菩薩分身無量無邊萬億佛世界禪師既言在滿足十地位今日為現少許神變崇遠望此意此五字原作望遠此意依下卷校改執見甚深特為見悟至玄所以簡詮如響號卷子到如字為止以下殘缺依下卷補響字三菩提達摩南宗定是非論下卷據我們現在的知識菩提達摩南宗定是非論現存三個敦煌寫本都在巴黎的國家圖書館這三個寫本的原編號是第一本號第二本號第三本號第一本我曾校寫作神會和尚遺集卷二今年我重新校寫作菩提達摩南宗定是非論的上卷第二本我曾校寫作神會和尚遺集卷三我在當時就說我疑心那一卷也是南宗定是非論別本的後半神會遺集亞東版頁一七現在第三本出現了其中果然有一部分和第二本完全相同可以彼此參校我當時曾指出第二本脫去了一紙現有的第三本果然可以補第二本的脫文六百字第三本是近年法國國家圖書館裏清理出來的前年鈴木大拙先生和他的學生從法國回到紐約帶來了號長卷的照片這個長卷的第一件就是南宗定是非論第二件就是南陽和上頓教解脫禪門直了性壇語這兩件都是我三十年前沒有看見的這個長卷的保存狀態很不好南宗定是非論是第一件所以前面殘缺最多損壞最多後面又因為紙張接縫之處往往脫節了往往被人胡亂黏接就黏錯了四大張紙每紙平均三十一行其中有一紙三十一行是壇語的一部分錯到南宗定是非論裏來了這三個敦煌寫本是同出于一個來源的三個鈔本這一點最可以表示神會的菩提達摩南宗定是非論在當時流行之廣而且遠第一本保存了定是非論的開頭有標題有造論者獨孤沛的姓名有此論開篇的四十九行這個有頭無尾的殘卷我現在叫作上卷第三本包括第二本的全部又有此論的最後部分又有造論者的駢文論贊和韻文頌贊最後有菩提達摩南宗定是非論一卷一行這個有尾無頭的長卷我現在寫定叫作下卷最有趣的是上卷的最後一段和下卷的最前一段都是遠法師問神會今在何地位神會自言在滿足十地位崇遠就要求他今日為現少許神變除了這一段之外上卷和下卷沒有一段有相同的內容所以我猜想這上下兩卷合併起來菩提達摩南宗定是非論的全卷大概都在這裏了我在一九二六年九月四日第一次發見此論到今年我校寫全論完畢恰是三十二年一九五八八卅一日胡適遠法師重問曰禪師用心於三賢十聖四果人等今在何地位和上言在滿足十地位遠法師言初地菩薩分身百佛世界二地菩薩分身千佛世界乃至十地菩薩分身無量無邊佛世界禪師既言在滿足十地位今日為現少許神變崇遠望此意執見甚深特為見悟至玄所以簡詮如響巴黎敦煌卷子後幅菩提達摩南宗定是非論殘卷的最後一段即是此段到簡詮如響的如字為止方括孤內的字都是我用那一卷校補此段殘壞的字看胡適神會遺集卷二頁一六六一六七和上言大般涅槃經云如來在日只許純陀心同如來心了如來來身經云南無純陀南無純陀身雖凡夫心如來佛此四句依大般涅槃經的壽命品第一之二校補此上引經如來在日只許純陀實不是經文常不言自證今日會身是凡怪遠法師默然不言此段崇遠問的最嚴厲因為神會自誇在滿足十地位所以崇遠要他現少許神變神會的答話殘缺太多但可以看出他自比于純陀在涅槃經裏佛在涅槃之前只受純陀的供養純陀雖然心如佛心究竟身是凡夫神會自認身是凡夫不能現什麼神變和上問遠得此處缺失約二十字經義者當知是人則見法師不見佛性故言不合講遠法師問禪師見佛性不和上答言見遠法師問為是比量見為是現量見和上答比量見又責問何者是比何者是量和上答所言比者比於純陀所言量者等純陀遠法師言禪師定見不和上答定見遠法師問作勿生見和上答無作勿生遠法師則默然不言和上見默然不識此言更不徵問和上言見在道俗總聽神會意欲得法師重問見神會三十餘年所學功夫唯在見字法師向來問見未稱神會意神會答法師見亦未盡情更欲得法師重問見亦欲得重問禪師是眼見為是見為遠法師和上言法師虛空虛空以上是本卷的第二段殘片今校移作第一段胡適按這幾段問答殘缺太多不容易懂得敦煌寫本曆代法寶記巴黎倫敦兩處都有兩本都收在大正新修大藏經第五十一卷朝鮮金九經參校兩本寫成一本分為三卷用鉛字排印發行題為校刊歷代法寶記有一長段提及神會開元中滑臺寺為天下學道者定其宗旨又天寶八載中洛州荷澤寺亦定宗旨那一長段雖然沒有舉出南宗定是非論的篇題其實是摘引了此論的文字我現在把法寶記引此論的部分鈔在這裏給我們做比較資料東京荷澤寺神會和上開元中滑臺寺為天下學道者定其宗旨天寶八載中洛州荷澤寺亦定宗旨被崇遠法師問禪師於三賢十聖修行證何地位會和上答曰涅槃經云南無純陀南無純陀身同凡夫心同佛心會和上却問遠法師講涅槃經來得幾篇遠法師答四十餘遍又問法師見佛性否法師答不見會和上云師子吼品云若人不見佛性即不合講涅槃經若見佛性即合講涅槃經遠法師却問和上見佛性否會答見又問云何為見復眼見耶耳鼻等見耶會答見無爾許多見只沒見又問見等純陀否會答比量見比即比於純陀量等純陀不敢定斷言有般若故致虛空無般若使不得遠法師言般若無知何故言見和上言般若無知無事不知以無不知故致使得言見遠法師杜口無言和上言比來法師喚禪師作無所知今日禪師喚法師作無所知遠法師問何故喚法師作無所知和上言唯嗟法師不知定慧等學又問何者是禪師定慧等學和上答言其定者體不可得言其慧者能見不可得體湛然常寂有恆沙之用故言定慧等學遠法師問禪師既口稱達摩宗旨未審此禪門者有相傳付囑為是得說只沒說和上答從上已來具有相傳付囑又問相傳已來經今幾代和上答經今六代遠法師以上原是本卷的第一段殘片今移作第二段此下敘菩提達摩將袈裟付囑與慧可再傳至僧璨殘缺約五六十字付囑璨禪師隨朝信禪師在雙峰山將袈裟付與禪師唐朝忍禪師在東山將袈裟付囑與能禪師經今六代內傳法契以印證心外傳袈裟以定宗旨從上相傳一一皆與達摩袈裟為信其袈裟今見在韶州更不與人餘物相傳者即是謬言又從上已來六代一代只許一人終無有二終有千萬學徒只許一人承後遠法師問何故一代只許一人承後和上答譬如一國唯有一王言有二者無有是處譬如一四天下唯有一轉輪王言有二轉輪王者無有是處譬如一世界唯有一佛出世言有二佛出世者無有是處遠法師問諸人總不合說禪教化衆生不和上答總合說禪教化衆生發起衆生一念善心者是不可思議昔釋迦如來在日諸化衆生終無有一人敢稱為佛者一代只有一人竪立宗旨開禪門今日天下諸百餘人各立門戶繚亂人者從上答從秀禪將說禪教人並傳餘人已下有數百餘人說禪教人並無大小無師資情共爭名利元無稟承亂於正法惑諸學道者此滅佛法相也能禪師是的的相傳付囑人已下門徒道俗近有數此下似脫十字或百字餘人無有一人敢濫開禪門縱有一人得付囑者至今未說遠法師問世人將秀禪師得道果不可思議人今日何故不許秀禪師充為六代和上答為忍禪師無傳授付囑在秀禪師處縱使後得道果亦不許充為第六代何以故為忍禪師無遙授記處所以不許遠法師問普寂禪師口稱第七代復如何和上答今秀禪師實非的的相傳尚不許充為第六代何況普寂禪師是秀禪師門徒承稟充為第七代見中嶽普寂禪師東嶽降魔藏禪師此二大德秀禪師是第六代未審秀禪師將信充為第六代我韶州一門從上已來排其代數皆達摩袈裟普寂禪師在嵩山竪碑銘立七祖堂修法寶紀排七代數其付囑佛法並不秀禪師已下門徒事何以故為無傳授所以不許遠法師問秀禪師為兩京法主三帝門師何故不許充為六代和上答從達摩已下至能和上六代大師無有一人為帝師者遠法師問未審法在衣上將衣以為傳法和上答法雖不在衣上表代代相承以傳衣為信令弘法者得有稟承學道者得知宗旨不錯謬故昔釋迦如來金蘭袈裟見在雞足山迦葉今見持此袈裟待彌勒出世分付此衣表釋迦如來傳衣為信我六代祖師亦復如是遠法師問未審能禪師與秀禪師是同學不答是又問既是同學教人同不同答言不同又問既是同學何故不同答今言不同者為秀禪師教人凝心入定住心看淨起心外照攝心內證此十六字屢見本卷末句證字皆作澄字但巴黎殘卷很清楚的作證字又殘卷也作證字這十六字四句定淨證為韻不應作澄故我校改作證下同緣此不同遠法師問何故能禪師此下卷子撕破損壞兩行止存幾個字攝心內證能禪師答此是心內證和上答此是愚人法離法即是能禪師處是故經文心不住內亦不在外是為宴坐如此坐者佛即印可從上六代已來皆無有一人凝心入定住心看淨起心外照攝心內證是以不同遠法師問能禪師已後有傳授人不巴黎殘卷即從傳授人不起我已校印在神會和尚遺集卷三頁一七五一八六此下用那個卷子校勘答有又問傳授者是誰和上答已後應自知遠法師問如此教門豈非是佛法何故不許和上答皆為頓漸不同所以不許我六代大師一一皆言單刀直入直了見性不言階漸夫學道者須頓見佛性漸修因緣此八字遺集三作頓悟漸修四字不離是生而得解脫譬如母頓生子本卷母上子上皆有其字今從遺集三與乳漸漸養育其子智慧自然增長頓悟見佛性者亦復如是智慧自然漸漸增長所以不許遠法師問嵩嶽普寂禪師東嶽降魔藏禪師此二大德皆教人坐禪凝心入定住心看淨起心外照攝心內證指此以為教門禪師今日何故說禪不教人坐遺集三無不教人坐四字不教人凝心入定住心看淨起心外照攝心內證何名坐禪和上答若教人坐遺集三無坐字兩卷皆無下教人二字教人凝心入定住心看淨起心外照攝心內證者此是障菩提今言坐者念不起為坐今言禪者見本性為禪所以不教人坐身住心入定若指彼教門為是者維摩詰不應訶舍利弗宴坐殘卷若指以下脫去一紙故我在遺集三頁一七六指出此處疑脫去一紙本卷若指以下果然有六百字可補遺集三的脫文遠法師問何故不許普寂禪師稱為南宗和上答為秀和上在日天下學道者號此二大師為南能北秀天下知聞因此號遂有南北兩宗普寂禪師實是玉泉學徒實不到韶州今口妄稱南宗所以不許神秀原住荊州的玉泉寺故普寂是玉泉學徒遠法師問何故不許普寂禪師和上答為普寂禪師口雖稱南宗意擬滅南宗遠法師問何故知意擬滅南宗和上歎言苦哉苦哉痛哉痛哉不可耳聞何期眼見開元二年中三月內使荊州刺客張行昌詐作僧取能和上頭大師靈質被害三刀盛續碑銘經磨兩遍盛續似是撰碑文的人名又使門徒武平一等磨却韶州大德碑銘別造文報鐫向能禪師碑立秀禪師為第六代及傳袈裟所由又今普寂禪師在嵩山竪碑銘立七祖堂修法寶紀排七代數不見著能禪師能禪師是得傳授付囑人為人天師蓋國知聞即不見著如禪師此是嵩山法如是秀禪師同學又非是傳授付囑人不為人天師天下不知聞有何承稟充為第六代普寂禪師為秀和上竪碑銘立秀和上為第六代今修法寶紀又立如禪師為第六代未審此二大德各立為第六代誰是誰非請普寂禪師子細自思量看遠法師問普寂禪師開法來數十餘年何故不早較量定其宗旨和上答天下學道者皆往決疑問真宗旨並被普寂禪師倚勢唱使門徒拖出縱有疑者不敢呈問未審為是為非昔釋迦如來在日他方諸來菩薩及諸聲聞一切諸外道等詰問如來一一皆善具答我韶州大師在日一切人來徵問者亦一一皆善具答未審普寂禪師依何經論不許借問誰知是非長安三年西曆七二秀和上在京城內登雲花戒壇上有網律師大儀於大衆中借問秀和上承聞達摩有一領袈裟相傳付囑今在大禪師處不秀和上云黃梅忍大師傳法袈裟今見在韶州能禪師處殘卷脫去一紙其脫文到今見字止秀和上在日指第六代傳法袈裟在韶州口不自稱為第六代數今普寂禪師自稱為第七代妄竪秀和上為第六代所以不許爾時和上告此五字本卷作又語二字依遺集三改遠法師及諸人等莫怪作如此說見世間教禪者多於學禪者極其繚亂恐天魔波旬及諸外道入在其中惑諸學道者滅於正法故如此說久視年遺集三年下有中字本卷無則天聖曆三年五月改元久視次年正月又改大足久視年當西曆七百年則天召秀和上入內臨發之時所是道俗頂禮和上借問和上入內去後所是門徒若為修道依止何處秀和上云韶州有大善知識元是東山忍大師付囑佛法盡在彼處汝等諸人如有不能自決了者向彼決疑必是不可思議即知佛法宗旨又普寂禪師同學西京清禪寺僧廣濟景龍三年七九十一月至韶州經十餘日遂於夜半入和上房內偷所傳袈裟和上喝出其夜惠達師遺集三作惠遠玄悟師聞和上喝聲即起看至和上房外遂見廣濟師把玄悟師手不遣作聲其玄悟師惠達師六字遺集三作惠遠玄悟等五字入和上房看和上和上云有人入房內申手取袈裟其夜所是南北道俗並至和上房內借問和上入來者是南人北人和上云唯見有人入來亦不知是南人北人衆人又問是僧是俗亦不知是僧是俗和上的的知此一段全依本卷遺集三文字稍不同如的的知三字遺集三作實識入房人恐畏有損傷者遂作此言和上云非但今日此袈裟在忍大師處三度被偷忍大師言其袈裟在信大師處一度被偷所是偷者皆偷不得因此袈裟南北道俗極甚紛紜常有刀棒相向遠法師問曰普寂禪師名字蓋國天下知聞衆口共傳為不可思議遺集三無為字何故如此苦相非斥遺集三無何故二字又脫苦字豈不與身命有讎本卷豈不之下誤脫一紙共三十一行此一紙自與身命有讎起至下文若善男子善女子信受金剛般若波羅蜜止誤黏在後文兩紙六十二行之後遺集三依據殘卷此處不誤今據他改正和上答曰讀此論者不識論意謂言非斥普寂禪師與南宗有別我自料簡是非定其宗旨我今為弘揚大乘建立正法令一切衆生知聞豈惜身命遠法師問修此論者不為求名利乎和上答曰修此論者生命尚不惜豈以名利關心本卷不為上有有字答曰下有今字依遺集三刪我跋遺集三曾指出卷子楷書精寫字字秀整此卷寫手是有學的文人故鈔寫時往往修改原文如上文改又語為爾時和上告如上文改的的知為實識入房人如此處刪有今兩字都是有意修改又遠法師此卷皆刪法字我此次校寫往往採用遺集三但如的的知之類可以表示原件的文體我仍保留原文遠法師問唐國菩提達摩既稱其始菩提達摩復承誰後又經幾代和上答菩提達摩西國承僧伽羅叉僧伽羅叉承須婆蜜須婆蜜皆當作婆須蜜即兩卷同誤承優婆崛優婆崛承舍那婆斯舍那婆斯承末田地末田地承阿難阿難承迦葉迦葉承如來付唐國以菩提達摩而為首西國以菩提達摩為第八代遺集三脫而為首西國以菩提達摩十字西國有般若蜜多羅承菩提達摩後唐國有惠可禪師承菩提達摩後本卷脫菩提達摩四字自如來付西國與唐國總經有一十三代此七字本卷作總有十四代今從遺集三達摩在西國為第八代在中國為第一代故兩國共十三代遠法師問據何得知菩提達摩在西國為第八代和上答據禪經序中具明西國代數又惠可禪師親於嵩山少林寺問菩提達摩西國相承者菩提達摩以上九字遺集三脫答一如禪經序所說此處神會引禪經序作他的西國八代說的根據禪經是東晉末年約當四一廬山譯出的達摩多羅禪經其開卷序引中說到大迦葉以下八個持法者神會把達摩多羅和菩提達摩誤認作一個人故有此大錯誤至于他說惠可親問達摩一節那更是有心說誑了看胡適荷澤大師神會傳三遠法師問西國亦傳衣不答西國不傳衣問西國何故不傳衣答西國為多遺集三無為字是得聖果者心無矯詐唯傳心契漢地多是凡夫苟求名利是非相雜所以傳衣定遺集三作示其宗旨遠法師問曰禪師修何法行何行和上答修般若波羅蜜法行般若波羅蜜行遠法師問何以不修餘法不行餘行唯獨修般若波羅蜜法行般若波羅蜜行本卷脫行般若波羅蜜六字依遺集三補和上答修學般若波羅蜜法能攝一切法行般若波羅蜜行是一切行之根本金剛般若波羅蜜最尊最勝最第一無生無滅無去來一切諸佛從中出和上言告諸知識若欲得了達甚深法界直入一行三昧者先須誦持金剛般若波羅蜜經修學般若波羅蜜法何以故誦持金剛般若波羅蜜經者當知是人不從小功德來譬如帝王生得太子若同俗例者無有是處何以故為從最尊最貴處來誦持金剛般若波羅蜜經者亦復如是是故金剛般若波羅蜜經云不於一佛二佛三四五佛而種善根已於無量百千萬億佛所種諸善根得聞如是言說章句乃至一念生淨信者如來悉知悉見何況書寫受持讀誦為人演說是故勝天王般若經云云何菩薩摩訶薩學般若波羅蜜通達甚深法界佛告勝天王言大王即是如實世尊云何如實大王即不變異世尊云何不變異大王所謂如如世尊云何如如大王此可智知非言能說何以故過諸文字無此無彼離相無相遠離思量過覺境觀是為菩薩遺集三無此二字了達甚深法界本卷與遺集三此下有勝天王般若經云七字今查下文的話並不見於勝天王經故刪般若波羅蜜無有一法可為譬喻若善男子善女人信受金剛般若波羅蜜經者遺集三無金剛二字又無經字又自上文與身命有讎起至此句金剛般若波羅蜜為止共一紙三十一行本卷誤黏在後文兩紙六十二行之後今已改正所獲功德不可思量若此功德有色有形者空界不可容遺集三脫可字以般若波羅蜜如實見名為證以智通達名為至假使一切衆生皆住十地入諸三昧觀如來定不能測量善知識必須誦持金剛般若波羅蜜經此八字依遺集三本卷作此經此經號為一切諸佛母經亦是一切諸法祖師恆沙三昧八萬四千諸波羅蜜門皆從般若波羅蜜生必須誦持此經何以故般若波羅蜜是一切法之根本譬如大摩尼寶在於此六字遺集三脫大海之內大海之內此四字遺集三脫所有一切諸寶皆因摩尼寶力而得增長何以故是大寶威德力故修學般若波羅蜜者亦復如是一切智慧皆因般若波羅蜜而得增長若不遺集三脫此二字誦般若波羅蜜經者譬如皇太子捨其父王於他人處而求得王位者無有是處故小品經云復次須菩提諸經不能至薩婆若此四字遺集三作薩波若海薩婆若是最高無上智慧若菩薩捨般若波羅蜜而讀誦之遺集三之下有餘字之指諸經不當有餘字是菩薩捨本而取枝葉是故勝天王般若經云佛告勝天王言菩薩摩訶薩修學一法通達一切法者所謂般若波羅蜜般若波羅蜜亦號為一切諸佛祕密藏亦號為總持法亦是大神咒是大明咒是無上咒是無等等咒能除一切苦除字依遺集三僧真實不虛三世諸佛皆因般若波羅蜜多故得阿耨多羅三藐三菩提是故金剛般若波羅蜜經云舉恆河中沙一沙為一恆河爾許恆河沙數三千大千世界七寶布施不如於此經中乃至受四句偈等如此功德勝前福德百分不及一百千萬億分乃至算數譬喻所不能及諸學道者金剛般若波羅蜜經隨所在之處一切世間天人阿修羅悉皆供養何以故為此經在處在處即尊經在人人亦貴此十五字遺集三作為此經在在處處即是為塔十一字何以故誦持金剛般若波羅蜜經者為能成就最上第一希有之法故在在處處若有金剛般若波羅蜜經卷一切諸佛恭敬般若波羅蜜經卷如佛弟子敬佛何以故經云諸佛之師所謂法也以法常故諸佛亦常是故金剛般若波羅蜜經云初日分以恆河沙等身命布施中日分復以恆河沙等身命布施後日分亦以恆河沙等身命布施如是無量百千萬億劫以身布施不如聞此經典信心不違何況書寫受持為人解說是故金剛般若波羅蜜經者者字本卷作云今從遺集三如來為發大乘者說為發最上乘者說何以故譬如大龍不雨閻浮提若雨閻浮提如漂棄葉若雨於大海其海不增不滅故若大乘者若最上乘者聞說金剛般若波羅蜜經不驚不怖不畏不疑者當知是善男子善女人從無量久遠劫來常供養無量諸佛及諸菩薩修學一初善法今日得聞般若波羅蜜不生驚疑是故經云若人滿三千大千世界用一切珍寶造七寶塔高於梵天不如誦持金剛般若波羅蜜經修學般若波羅蜜若人教化三千大千世界微塵數衆生盡證須陀洹果不如誦持金剛般若波羅蜜經若人教化三千大千世界微塵數衆生盡證斯陀含果不如誦持金剛般若波羅蜜經若人教化三千大千世界微塵數衆生盡證阿那含果不如誦持金剛般若波羅蜜經若人教化三千大千世界微塵數衆生盡證阿羅漢果不如誦持金剛般若波羅蜜經以上三十三字遺集三脫若人教化三千大千世界微塵數衆生盡證辟支佛道不如誦持金剛般若波羅蜜經若人教化三千大千世界微塵數衆生盡證得十信心盡證得十住心盡證得十行心盡證得十回向心不如誦持金剛般若波羅蜜經何以故是經有不可思議不可稱量無有邊不可思議功德為能成就諸佛甚深無上智慧故殘卷遺集三至是經有不可為止以下殘缺故告諸知識若人犯阿鼻地獄一切極惡重罪無處懺悔而不能得滅者必須誦持金剛般若波羅蜜經修學般若波羅蜜當知是人其罪即滅何以故譬如一切雜色之鳥至須彌山下發心與山同共一色何以故是山威德力故誦持金剛般若波羅蜜經威德力故亦復如是諸知識誦持金剛般若波羅蜜經而不能得入一行三昧者為先世重罪業障故必須誦持此經以此經威德力故感得世人輕賤現世輕受以輕受故以輕賤故先世重罪業障即為消滅以消滅故即得入一行三昧是故勝天王般若經云佛告文殊師利若四天下悉為微塵彌許塵數諸佛如來若有惡人皆悉殺害文殊師利於意云何是人得罪多不文殊師利菩薩白佛言世尊此罪不可聞不可計不可思量佛告文殊師利菩薩若復有人障礙此修多羅此四字原作金剛般若波羅蜜經依勝天王經改正修多羅即經毀謗不信其罪重彼百分不及一千分萬分不及一乃至算數譬喻所不能及是故金剛般若波羅蜜經云佛自言我念過去無量阿僧祇劫於燃燈佛前得值八萬四千萬億那由他一個那由他是十万或百万或千万此句八万原作八百諸佛及佛弟子一一供養承事無空過者而不能得授菩提記何以故為有所得及後於燃燈佛所得菩提記者為讀誦金剛般若波羅蜜經修學般若波羅蜜獲無所得得菩提記今得成佛號釋迦牟尼若將供養諸佛功德較量誦持此金剛般若波羅蜜經及為他人說所得功德百分不及一百千萬億分乃至算數譬喻所不能及此一節與金剛經各種譯本都不相符是故勝天王般若經云大王譬如四大依虛空立空更無依煩惱亦爾依此法恃法性無依大王菩薩摩訶薩學般若波羅蜜如實觀知勝天王般若經云無量阿僧祇劫三千大千世界微塵一塵為一三千大千世界爾許微塵數三千大千世界滿中七寶積至阿迦尼仛天布施微塵數三千大千世界爾許聖人功德多不文殊師利菩薩言世尊前之福德已不可思量況此功德佛告文殊師利菩薩從若善男子善女人信受金剛般若波羅蜜經者所獲功德不可思量的經字起至此句菩薩字止凡兩紙六十二行誤黏在如此苦相非斥豈不之下此兩紙下面誤黏的一紙三十一行自與身命有讎起至信受金剛般若波羅蜜的蜜字止已校移向前了但此一紙之後又誤黏了一紙自若行到宅中起至受得禪法所學各止共三十一行乃是南陽和上頓教解脫禪門直了性壇語的一部分我用日本鈴木大拙先生的少室逸書所收和尚頓教解脫禪門直了性壇語校勘將此一紙抽出于是本卷的兩個神會遺稿都補全了若善男子善女人流通此般若波羅蜜經為他人宣說此功德勝彼百分不及一千萬分不及一乃至算數譬喻所不能及是故金剛般若波羅蜜經云須菩提若人以滿無量阿僧祇世界七寶持用布施若有善男子善女人發菩薩心者誦持此經為人演說其福勝彼云何為人演說不取於相云何不取於相所謂如如云何如如所謂無念云何無念所謂不念有無不念善惡不念有邊際無邊際不念有限量無限量不念菩提不以菩提為念不念涅槃不以涅槃為念是為無念是無念者即是般若波羅蜜般若波羅蜜者即是一行三昧諸善知識若在學地者心若有念起即便覺照起心既滅覺照自亡即是無念是無念者即無一境界如有一境界者即與無念不相應故諸知識如實見者了達甚深法界即是一行三昧是故小品般若波羅蜜經云善男子是為般若波羅蜜所謂於諸法無所念我等住於無念法中得如是金色身三十二相大光明不可思議智慧諸佛無上三昧無上智慧盡諸功德邊是諸功德諸佛說之猶不能盡何況聲聞辟支佛能知見無念者六根無染見無念者得向佛知見見無念者名為實相見無念者中道第一義諦見無念者恆沙功德一時等備見無念者能生一切法見無念者能攝一切法和上於大衆中法座上高聲言我今能了如來性如來今在我身中我與如來無差別如來即我真如海敬白十方諸佛諸大菩薩摩訶薩一切賢聖今捨身命修頓悟最上乘論者願一切衆生聞讚歎金剛般若波羅蜜決定深信堪任不退故今捨身命願盡未來劫常讚歎金剛般若波羅蜜願一切衆生聞讚歎般若波羅蜜者即能讀誦受持堪任不退故今捨身命願盡未來劫常讚歎金剛般若波羅蜜願一切衆生聞讚歎般若波羅蜜者即能決定修行般若波羅蜜堪任不退故願我盡未來劫常捨身命供養金剛般若波羅蜜願我堪為般若波羅蜜主常為一切衆生說金剛般若波羅蜜願一切衆生聞說金剛般若波羅蜜獲無所得願我盡未來劫為一切衆生常捨身命守護金剛般若波羅蜜願一切衆生依般若波羅蜜故獲無所得一時成佛和上問遠法師言曾講大般涅槃經不法師言講大般涅槃經數十遍和上言一切大小乘經論說衆生不解脫者緣有生滅二心又涅槃經云諸行無常是生滅法生滅滅已寂滅為樂未審生之與滅可滅不可滅為是將生滅滅為是將滅滅生為是生能自滅生為是滅能自滅滅請法師一一具答法師言亦見諸經論作如是說至於此義實不能了禪師若了此義請為衆說和上言不辭為說恐無解者法師言道俗有一萬餘人可無有一人解者和上言看見不見法師言見是沒和上言果然不見法師既得此語結舌無對非論一已屈詞抑亦諸徒失志勝負既分道俗嗟散焉焉字原作然以上為菩提達摩南宗定是非論以下為論贊和上禪池慧水引長潤於心源戒藏慈燈照圓明於身域指授不思議法為無所為稱讚離相法門說無所說六念九次實理心融三藏五乘真如體解故得入講論處邪幢必摧定是非端勝幡恆建若彼空山谷響任無起以同聲明鏡分形鑒有色而開相某乙叨陪學侶濫預門徒不揆庸虛敢申愚拙比年道業希得却亡言此法門息求而得約無住之理理上住義宛然起有見之原作斯法法中見心安在迷樂之日樂中之苦昔時悟苦之時苦中之樂今日每恨不逢激勵更叨讚揚謹録所聞藏之篋笥發心畢竟二不別如是二心先心難自未得度先度他是故我禮初發心初發已為天人師勝出聲聞及緣覺如是發心過三界是故得名最無上以上八句又見南陽和上壇語言菩提達摩南宗定是非論者敘六代大德師師相授法印相傳代代相承本宗無替自達摩大師之後一代只許一人中間儻有二三即是謬行佛法況今天下教禪者無數學禪者全稀並無稟承憑何立教徒以雞鳳相誑蒲脯成欺飾魚目以充珍將夜光而為寶我和上屬正法陵遲之日邪法繚亂之時知欲行後醫之本方當棄先醫之乳藥知字原在後字之下當字原在欲字之上今依文義校正這個當棄先醫之乳藥的故事看法顯譯本大般泥洹經的哀歎品重揚真教息世云云知摸珠者非珠空尋水月見學道者非道徒向寶山誠弄影而勞形實揚聲而心響所以修論聊欲指南使大道洽於蒼生正法流於天下其論先陳激揚問答之事使學者辨於疑者後敘師資傳授之言斷除疑惑審詳其論不可思議聞者皆言昔者未聞見者皆言昔者未見斯乃宅中寶藏忽爾自開苦海津梁不期原作其而至矣嗚呼六代傳信今在韶州四輩學徒空遊嵩嶺可謂魚遊於水布網於高山于時有同學相謂曰嵩山寂和上一佛出世帝王之師天下仰德四海歸依何人敢是何人敢非又同學中有一長老答曰止如此之事非汝所知如此之事非汝能及汝但知貴耳賤目重古輕今信識涓流寧知巨海我和上承六代之後付囑分明又所立宗體與諸家不等衆人禪指皆言善哉有何差別答曰更不須子細和上言教指授甚深不可以智知不可以識識縱使三賢十聖孰辨淺深聲聞緣覺莫知涯際去開元二十原作十二年正月十五日共遠法師論議心地略開動氣陵雲發言驚衆道俗相謂達摩後身所是對問宏詞因即編之為論論云今日設無遮大會非為功德為天下學者定是非為天下用心者辨邪正是非邪正具載明文並敘本宗傳之後代雖寂和上在世濟群生為與曹溪不同所以南中敘論今日罕聞是事喜躍難勝聊自課虛以成